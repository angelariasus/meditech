<div class="bg-background text-on-background font-body-lg min-h-screen flex items-center justify-center p-4 md:p-0">
  <div class="w-full max-w-[1200px] h-[720px] bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] overflow-hidden flex flex-col md:flex-row relative">
    <!-- Left Panel: Aspirational Medical Image -->
    <div class="w-full md:w-5/12 h-64 md:h-full relative hidden md:block">
      <div class="absolute inset-0 bg-primary/20 mix-blend-multiply z-10"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent z-10"></div>
      <img alt="Doctor using modern technology" class="absolute inset-0 w-full h-full object-cover object-center" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVCAFb-4u00SSOiLyoOF2OJxsY6VAM7SEBzKolr7wiwpTLDEQay_ULDPO5yRaD6LHNQhwqEux0qmOksZZI2RR9wA3P2inuaSeLQof_H-HYVV4HNcVy50PLj13lhU5Py0u_feIZXFAzD2AkL5HMLMlvN9iOK-54bObGMZUM_gFYCd4t8Jw7oeSyTQLZqhwHc5oIvoSa1pw_9YiOcT_bRsjFgvTj1x4QE8-CEkk5FLhjGC1m8qls8yB6fnlIdFjaX7SXkB37M8dodnY"/>
      <div class="absolute bottom-12 left-10 z-20 text-white">
        <div class="flex items-center gap-2 mb-4">
          <span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
          <h1 class="font-headline-lg text-headline-lg font-bold">Meditech</h1>
        </div>
        <p class="font-title-lg text-title-lg text-white/90">Salud Digital</p>
        <p class="font-body-md text-body-md text-white/70 mt-4 max-w-xs">Plataforma administrativa integral para profesionales de la salud.</p>
      </div>
    </div>
    <!-- Right Panel: Login Form -->
    <div class="w-full md:w-7/12 p-8 md:p-16 flex flex-col justify-center bg-surface-container-lowest">
      <div class="max-w-[400px] w-full mx-auto">
        <div class="mb-10 text-center md:text-left">
          <div class="flex items-center justify-center md:justify-start gap-2 mb-4 md:hidden text-primary">
            <span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
            <h1 class="font-headline-md text-headline-md font-bold">Meditech</h1>
          </div>
          <h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Iniciar Sesión</h2>
          <p class="font-body-md text-body-md text-on-surface-variant">Ingrese sus credenciales para acceder al panel administrativo.</p>
        </div>
        <form (ngSubmit)="onSubmit()" class="space-y-6">
          <div>
            <label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Correo Electrónico</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-outline">mail</span>
              </div>
              <input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface focus:ring-2 focus:ring-primary focus:border-primary text-on-surface font-body-md text-body-md transition-colors" id="email" name="email" placeholder="doctor@clinica.com" required="" type="email"/>
            </div>
          </div>
          <div>
            <label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="password">Contraseña</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-outline">lock</span>
              </div>
              <input class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-lg bg-surface focus:ring-2 focus:ring-primary focus:border-primary text-on-surface font-body-md text-body-md transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
                <span class="material-symbols-outlined text-outline hover:text-on-surface-variant transition-colors">visibility</span>
              </div>
            </div>
          </div>
          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface" id="remember-me" name="remember-me" type="checkbox"/>
              <label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                Recordarme
              </label>
            </div>
            <div class="text-sm">
              <a class="font-body-md text-body-md font-medium text-primary hover:text-primary-container transition-colors" href="#">
                ¿Olvidó su contraseña?
              </a>
            </div>
          </div>
          <div>
            <button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary font-label-md text-label-md uppercase tracking-wider transition-all duration-200 active:scale-[0.98]" type="submit">
              Acceder al Sistema
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
