version: '3.8'

services:
  backend:
    build: .
    container_name: meditech_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=meditech_db
      - DB_USER=postgres
      - DB_PASSWORD=tu_password_aqui
      - DATABASE_URL=postgresql://postgres:tu_password_aqui@db:5432/meditech_db
      - JWT_SECRET=cambia_esto_por_un_secreto_muy_largo_y_seguro_en_produccion
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_SECRET=otro_secreto_diferente_para_refresh_tokens
      - JWT_REFRESH_EXPIRES_IN=7d
      - ALLOWED_ORIGINS=http://localhost:4200,http://localhost:19006
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    # Usamos el script 'dev' de package.json (nodemon) para que se reinicie con los cambios locales
    command: pnpm run dev

  db:
    image: postgres:15-alpine
    container_name: meditech_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_password_aqui
      POSTGRES_DB: meditech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meditech_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
